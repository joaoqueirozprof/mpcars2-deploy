events {
    worker_connections 1024;
}

http {
    upstream api {
        server mpcars2-api:8000;
    }

    upstream web {
        server mpcars2-web:80;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api;
        }

        location /docs {
            proxy_pass http://api;
        }

        location /openapi.json {
            proxy_pass http://api;
        }

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
        }
    }
}
